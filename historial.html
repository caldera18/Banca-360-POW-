<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banca 360 | Historial de Movimientos</title>
    <link rel="icon" href="assets/isotipo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
  </head>
  <body>
    <div class="app-layout">
      <aside class="sidebar">
        <a href="dashboard.html" class="sidebar-logo">
          <img src="assets/logo.svg" alt="Banca 360" />
        </a>
        <nav class="sidebar-menu">
          <a href="dashboard.html"><i class="fa-solid fa-house"></i> Inicio</a>
          <a href="transferencias.html"
            ><i class="fa-solid fa-paper-plane"></i> Transferencias</a
          >
          <a href="pago-movil.html"
            ><i class="fa-solid fa-mobile-screen"></i> Pago móvil</a
          >
          <a href="depositos.html"
            ><i class="fa-solid fa-money-bill-transfer"></i> Depósitos</a
          >
          <a href="historial.html" class="active"
            ><i class="fa-solid fa-clock-rotate-left"></i> Historial</a
          >
          <a href="perfil.html"><i class="fa-solid fa-user"></i> Perfil</a>
          <a href="#" id="logoutBtn" class="logout"
            ><i class="fa-solid fa-right-from-bracket"></i> Cerrar sesión</a
          >
        </nav>
      </aside>

      <main class="dashboard-main">
        <header class="dashboard-header">
          <div>
            <h1 class="title">Historial Completo</h1>
            <p class="welcome-text">Consulta todos tus movimientos bancarios</p>
          </div>
          <div class="header-actions">
            <button class="icon-btn" data-theme-toggle type="button">
              <i class="fa-solid fa-circle-half-stroke"></i>
            </button>
          </div>
        </header>

        <section class="filters-card">
          <span class="filters-label">Filtrar por:</span>
          <button class="btn btn-secondary btn-nav active" data-filter="todas">
            Todas
          </button>
          <button class="btn btn-secondary btn-nav" data-filter="entrada">
            Solo entradas
          </button>
          <button class="btn btn-secondary btn-nav" data-filter="salida">
            Solo salidas
          </button>
        </section>

        <section class="transactions-card">
          <div id="historyContainer" class="transaction-list"></div>
        </section>
      </main>
    </div>

    <script src="js/storage.js"></script>
    <script src="js/theme.js"></script>
    <script src="js/historial.js"></script>
  </body>
</html>
