<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Banca 360 | Comprobante</title>
    <link rel="icon" href="assets/isotipo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
  </head>
  <body>
    <main class="auth-page">
      <section class="auth-card auth-card-center">
        <div class="success-icon-large">
          <i class="fa-solid fa-circle-check"></i>
        </div>

        <h1 class="title">¡Operación Exitosa!</h1>
        <p class="subtitle" id="receiptTitle">Comprobante de transacción</p>

        <div id="receiptBox" class="receipt-data"></div>

        <div class="action-buttons-col">
          <button class="btn btn-secondary" onclick="window.print()">
            <i class="fa-solid fa-download"></i> Descargar PDF
          </button>
          <a href="dashboard.html" class="btn btn-primary">Volver al inicio</a>
        </div>
      </section>
    </main>

    <script src="js/storage.js"></script>
    <script>
      const data = JSON.parse(
        localStorage.getItem("banca360LastReceipt") || "null",
      );
      const box = document.querySelector("#receiptBox");
      const titleEl = document.querySelector("#receiptTitle");

      if (data) {
        titleEl.textContent = data.title;
        box.innerHTML = `
                <div class="receipt-row"><span>Referencia:</span> <strong>#${data.tx.id}</strong></div>
                <div class="receipt-row"><span>Fecha:</span> <strong>${data.tx.date}</strong></div>
                <div class="receipt-row"><span>Descripción:</span> <strong>${data.tx.description}</strong></div>
                <div class="receipt-amount">
                    <span>Monto Total</span>
                    <h2>Bs. ${data.tx.amount.toFixed(2)}</h2>
                </div>
            `;
      } else {
        box.innerHTML = "<p>No se encontró información del movimiento.</p>";
      }
    </script>
  </body>
</html>
