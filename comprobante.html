<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Comprobante</title><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/global.css"></head><body><main class="auth-page"><section class="auth-card"><h1 class="title">Comprobante</h1><div id="receiptBox"></div><p class="small">Puedes guardar este comprobante o hacer una captura de pantalla.</p><a href="dashboard.html" class="btn btn-primary">Volver al dashboard</a></section></main><script src="js/storage.js"></script><script>const data=JSON.parse(localStorage.getItem('banca360LastReceipt')||'null');const box=document.querySelector('#receiptBox');if(data){box.innerHTML=`<p><strong>${data.title}</strong></p><p>ID: ${data.tx.id}</p><p>Fecha: ${data.tx.date}</p><p>Descripción: ${data.tx.description}</p><p>Monto: Bs. ${data.tx.amount.toFixed(2)}</p>`;} </script></body></html>
