<!doctype html><html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Detalle movimiento</title><link rel="stylesheet" href="css/variables.css"><link rel="stylesheet" href="css/global.css"></head><body><main class="auth-page"><section class="auth-card"><h1 class="title">Movimiento</h1><div id="movement"></div><a class="btn btn-primary" href="dashboard.html">Volver</a></section></main><script src="js/storage.js"></script><script>const id=Number(new URLSearchParams(location.search).get('id'));const tx=(getUser()?.transactions||[]).find(t=>t.id===id);document.querySelector('#movement').innerHTML=tx?`<p><strong>${tx.description}</strong></p><p>Fecha: ${tx.date}</p><p>Monto: Bs. ${tx.amount.toFixed(2)}</p><p>Tipo: ${tx.type}</p>`:'Movimiento no encontrado';</script></body></html>
