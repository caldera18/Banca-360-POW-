<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="assets/isotipo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <link rel="stylesheet" href="css/variables.css" />
    <link rel="stylesheet" href="css/global.css" />
    <title>Banca 360 | Iniciar sesión</title>
  </head>

  <body>
    <main class="auth-page">
      <section class="auth-card">
        <div class="auth-logo">
          <img src="assets/logo.svg" alt="Banca 360" />
        </div>

        <h1 class="title">Bienvenido</h1>
        <p class="subtitle">Ingresa a tu cuenta de forma segura.</p>

        <form id="loginForm">
          <div class="form-group">
            <label for="email">Correo electrónico</label>
            <div class="input-wrap">
              <i class="fa-regular fa-user"></i>
              <input id="email" type="email" placeholder="usuario@correo.com" />
            </div>
          </div>

          <div class="form-group">
            <label for="password">Contraseña</label>
            <div class="input-wrap">
              <i class="fa-solid fa-lock"></i>
              <input
                id="password"
                type="password"
                placeholder="Mínimo 6 números"
              />
              <i
                class="fa-regular fa-eye password-eye"
                data-toggle-password="password"
              ></i>
            </div>
          </div>

          <p id="loginError" class="error"></p>

          <button class="btn btn-primary" id="loginBtn" type="submit">
            <span class="btn-text">Ingresar</span>
            <span class="spinner hidden"></span>
          </button>
        </form>

        <p class="small">
          ¿No tienes cuenta?
          <a class="link" href="registro.html">Regístrate</a>
        </p>

        <button
          class="btn theme-toggle"
          data-theme-toggle
          style="width: 100%; margin-top: 16px"
          type="button"
        >
          <i class="fa-solid fa-circle-half-stroke"></i>
          Cambiar tema
        </button>
      </section>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
  </body>
</html>
